<svg xmlns="http://www.w3.org/2000/svg" width="520" height="300" viewBox="0 0 520 300" role="img" aria-labelledby="title desc">
  <title id="title">Connected components</title>
  <desc id="desc">Two separated groups of connected graph nodes.</desc>
  <style>
    .edge{stroke:#8a8f98;stroke-width:3}
    .a{fill:#2563eb;stroke:#1e40af;stroke-width:3}
    .b{fill:#16a34a;stroke:#166534;stroke-width:3}
    .txt{font:700 17px Arial,sans-serif;fill:white;text-anchor:middle;dominant-baseline:central}
    .label{font:600 16px Arial,sans-serif;fill:#1f2937;text-anchor:middle}
    .note{font:14px Arial,sans-serif;fill:#4b5563;text-anchor:middle}
  </style>
  <rect width="520" height="300" fill="#fff"/>
  <text x="260" y="28" class="label">Connected Components</text>
  <ellipse cx="160" cy="155" rx="115" ry="90" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
  <ellipse cx="375" cy="155" rx="95" ry="90" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
  <line x1="115" y1="120" x2="205" y2="120" class="edge"/>
  <line x1="205" y1="120" x2="160" y2="195" class="edge"/>
  <circle cx="115" cy="120" r="26" class="a"/><text x="115" y="120" class="txt">0</text>
  <circle cx="205" cy="120" r="26" class="a"/><text x="205" y="120" class="txt">1</text>
  <circle cx="160" cy="195" r="26" class="a"/><text x="160" y="195" class="txt">2</text>
  <line x1="340" y1="120" x2="410" y2="120" class="edge"/>
  <line x1="375" y1="120" x2="375" y2="195" class="edge"/>
  <circle cx="340" cy="120" r="26" class="b"/><text x="340" y="120" class="txt">3</text>
  <circle cx="410" cy="120" r="26" class="b"/><text x="410" y="120" class="txt">4</text>
  <circle cx="375" cy="195" r="26" class="b"/><text x="375" y="195" class="txt">5</text>
  <text x="160" y="260" class="note">component 1</text>
  <text x="375" y="260" class="note">component 2</text>
</svg>
