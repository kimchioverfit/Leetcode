<svg xmlns="http://www.w3.org/2000/svg" width="560" height="180" viewBox="0 0 560 180" role="img" aria-labelledby="title desc">
  <title id="title">1886 example 2</title>
  <desc id="desc">A 2 by 2 matrix cannot be rotated to match the target matrix.</desc>
  <defs>
    <style>
      .label { font: 600 18px Arial, sans-serif; fill: #1f2937; }
      .note { font: 14px Arial, sans-serif; fill: #991b1b; }
      .cell { stroke: #374151; stroke-width: 2; rx: 6; }
      .zero { fill: #f9fafb; }
      .one { fill: #2563eb; }
      .digit0 { font: 700 22px Arial, sans-serif; fill: #111827; }
      .digit1 { font: 700 22px Arial, sans-serif; fill: #ffffff; }
      .cross { stroke: #dc2626; stroke-width: 6; stroke-linecap: round; }
    </style>
  </defs>
  <rect width="560" height="180" fill="#ffffff"/>
  <text x="95" y="30" text-anchor="middle" class="label">mat</text>
  <text x="465" y="30" text-anchor="middle" class="label">target</text>
  <text x="280" y="92" text-anchor="middle" class="note">no rotation matches</text>
  <line x1="265" y1="110" x2="295" y2="140" class="cross"/>
  <line x1="295" y1="110" x2="265" y2="140" class="cross"/>
  <g transform="translate(50 50)">
    <rect x="0" y="0" width="45" height="45" class="cell zero"/><text x="22.5" y="30" text-anchor="middle" class="digit0">0</text>
    <rect x="45" y="0" width="45" height="45" class="cell one"/><text x="67.5" y="30" text-anchor="middle" class="digit1">1</text>
    <rect x="0" y="45" width="45" height="45" class="cell one"/><text x="22.5" y="75" text-anchor="middle" class="digit1">1</text>
    <rect x="45" y="45" width="45" height="45" class="cell one"/><text x="67.5" y="75" text-anchor="middle" class="digit1">1</text>
  </g>
  <g transform="translate(420 50)">
    <rect x="0" y="0" width="45" height="45" class="cell one"/><text x="22.5" y="30" text-anchor="middle" class="digit1">1</text>
    <rect x="45" y="0" width="45" height="45" class="cell zero"/><text x="67.5" y="30" text-anchor="middle" class="digit0">0</text>
    <rect x="0" y="45" width="45" height="45" class="cell zero"/><text x="22.5" y="75" text-anchor="middle" class="digit0">0</text>
    <rect x="45" y="45" width="45" height="45" class="cell one"/><text x="67.5" y="75" text-anchor="middle" class="digit1">1</text>
  </g>
</svg>
