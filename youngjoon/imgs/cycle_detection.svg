<svg xmlns="http://www.w3.org/2000/svg" width="540" height="300" viewBox="0 0 540 300" role="img" aria-labelledby="title desc">
  <title id="title">Cycle detection</title>
  <desc id="desc">A highlighted triangle cycle in a graph.</desc>
  <style>
    .edge{stroke:#9ca3af;stroke-width:3}
    .cycle{stroke:#dc2626;stroke-width:5}
    .node{fill:#2563eb;stroke:#1e40af;stroke-width:3}
    .hot{fill:#dc2626;stroke:#991b1b}
    .txt{font:700 18px Arial,sans-serif;fill:white;text-anchor:middle;dominant-baseline:central}
    .label{font:600 17px Arial,sans-serif;fill:#1f2937;text-anchor:middle}
    .note{font:14px Arial,sans-serif;fill:#dc2626;text-anchor:middle}
  </style>
  <rect width="540" height="300" fill="#fff"/>
  <text x="270" y="30" class="label">Cycle Detection</text>
  <line x1="270" y1="75" x2="165" y2="190" class="cycle"/>
  <line x1="165" y1="190" x2="375" y2="190" class="cycle"/>
  <line x1="375" y1="190" x2="270" y2="75" class="cycle"/>
  <line x1="270" y1="75" x2="270" y2="240" class="edge"/>
  <circle cx="270" cy="75" r="30" class="hot"/><text x="270" y="75" class="txt">A</text>
  <circle cx="165" cy="190" r="30" class="hot"/><text x="165" y="190" class="txt">B</text>
  <circle cx="375" cy="190" r="30" class="hot"/><text x="375" y="190" class="txt">C</text>
  <circle cx="270" cy="240" r="26" class="node"/><text x="270" y="240" class="txt">D</text>
  <text x="270" y="278" class="note">A -> B -> C -> A forms a cycle</text>
</svg>
