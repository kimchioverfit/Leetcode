<svg xmlns="http://www.w3.org/2000/svg" width="560" height="300" viewBox="0 0 560 300" role="img" aria-labelledby="title desc">
  <title id="title">Union-Find path compression</title>
  <desc id="desc">Path compression flattens a parent chain so nodes point directly to the root.</desc>
  <style>
    .edge{stroke:#6b7280;stroke-width:3}
    .root{fill:#dc2626;stroke:#991b1b;stroke-width:3}
    .node{fill:#2563eb;stroke:#1e40af;stroke-width:3}
    .flat{fill:#16a34a;stroke:#166534;stroke-width:3}
    .txt{font:700 17px Arial,sans-serif;fill:white;text-anchor:middle;dominant-baseline:central}
    .label{font:600 16px Arial,sans-serif;fill:#1f2937;text-anchor:middle}
    .note{font:14px Arial,sans-serif;fill:#4b5563;text-anchor:middle}
  </style>
  <rect width="560" height="300" fill="#fff"/>
  <text x="280" y="28" class="label">Union-Find: Path Compression</text>
  <text x="140" y="58" class="note">before find(4)</text>
  <line x1="140" y1="85" x2="140" y2="120" class="edge"/>
  <line x1="140" y1="145" x2="140" y2="180" class="edge"/>
  <line x1="140" y1="205" x2="140" y2="240" class="edge"/>
  <circle cx="140" cy="80" r="24" class="root"/><text x="140" y="80" class="txt">0</text>
  <circle cx="140" cy="140" r="24" class="node"/><text x="140" y="140" class="txt">1</text>
  <circle cx="140" cy="200" r="24" class="node"/><text x="140" y="200" class="txt">2</text>
  <circle cx="140" cy="260" r="24" class="node"/><text x="140" y="260" class="txt">4</text>
  <text x="280" y="155" class="label">=&gt;</text>
  <text x="420" y="58" class="note">after compression</text>
  <line x1="420" y1="90" x2="360" y2="180" class="edge"/>
  <line x1="420" y1="90" x2="420" y2="185" class="edge"/>
  <line x1="420" y1="90" x2="480" y2="180" class="edge"/>
  <circle cx="420" cy="80" r="24" class="root"/><text x="420" y="80" class="txt">0</text>
  <circle cx="360" cy="200" r="24" class="flat"/><text x="360" y="200" class="txt">1</text>
  <circle cx="420" cy="205" r="24" class="flat"/><text x="420" y="205" class="txt">2</text>
  <circle cx="480" cy="200" r="24" class="flat"/><text x="480" y="200" class="txt">4</text>
  <text x="280" y="285" class="note">Repeated find operations become nearly constant time</text>
</svg>
