<svg xmlns="http://www.w3.org/2000/svg" width="620" height="220" viewBox="0 0 620 220" role="img" aria-labelledby="title desc">
  <title id="title">1886 example 3</title>
  <desc id="desc">A 3 by 3 matrix rotates 180 degrees to match the target matrix.</desc>
  <defs>
    <style>
      .label { font: 600 18px Arial, sans-serif; fill: #1f2937; }
      .note { font: 14px Arial, sans-serif; fill: #4b5563; }
      .cell { stroke: #374151; stroke-width: 2; rx: 6; }
      .zero { fill: #f9fafb; }
      .one { fill: #2563eb; }
      .digit0 { font: 700 21px Arial, sans-serif; fill: #111827; }
      .digit1 { font: 700 21px Arial, sans-serif; fill: #ffffff; }
      .arrow { stroke: #16a34a; stroke-width: 5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#16a34a"/>
    </marker>
  </defs>
  <rect width="620" height="220" fill="#ffffff"/>
  <text x="110" y="30" text-anchor="middle" class="label">mat</text>
  <text x="510" y="30" text-anchor="middle" class="label">target</text>
  <text x="310" y="100" text-anchor="middle" class="note">rotate 180 degrees</text>
  <path d="M250 105 C285 55 335 55 370 105" class="arrow" marker-end="url(#arrowhead)"/>
  <g transform="translate(42 50)">
    <rect x="0" y="0" width="45" height="45" class="cell zero"/><text x="22.5" y="30" text-anchor="middle" class="digit0">0</text>
    <rect x="45" y="0" width="45" height="45" class="cell zero"/><text x="67.5" y="30" text-anchor="middle" class="digit0">0</text>
    <rect x="90" y="0" width="45" height="45" class="cell zero"/><text x="112.5" y="30" text-anchor="middle" class="digit0">0</text>
    <rect x="0" y="45" width="45" height="45" class="cell zero"/><text x="22.5" y="75" text-anchor="middle" class="digit0">0</text>
    <rect x="45" y="45" width="45" height="45" class="cell one"/><text x="67.5" y="75" text-anchor="middle" class="digit1">1</text>
    <rect x="90" y="45" width="45" height="45" class="cell zero"/><text x="112.5" y="75" text-anchor="middle" class="digit0">0</text>
    <rect x="0" y="90" width="45" height="45" class="cell one"/><text x="22.5" y="120" text-anchor="middle" class="digit1">1</text>
    <rect x="45" y="90" width="45" height="45" class="cell one"/><text x="67.5" y="120" text-anchor="middle" class="digit1">1</text>
    <rect x="90" y="90" width="45" height="45" class="cell one"/><text x="112.5" y="120" text-anchor="middle" class="digit1">1</text>
  </g>
  <g transform="translate(442 50)">
    <rect x="0" y="0" width="45" height="45" class="cell one"/><text x="22.5" y="30" text-anchor="middle" class="digit1">1</text>
    <rect x="45" y="0" width="45" height="45" class="cell one"/><text x="67.5" y="30" text-anchor="middle" class="digit1">1</text>
    <rect x="90" y="0" width="45" height="45" class="cell one"/><text x="112.5" y="30" text-anchor="middle" class="digit1">1</text>
    <rect x="0" y="45" width="45" height="45" class="cell zero"/><text x="22.5" y="75" text-anchor="middle" class="digit0">0</text>
    <rect x="45" y="45" width="45" height="45" class="cell one"/><text x="67.5" y="75" text-anchor="middle" class="digit1">1</text>
    <rect x="90" y="45" width="45" height="45" class="cell zero"/><text x="112.5" y="75" text-anchor="middle" class="digit0">0</text>
    <rect x="0" y="90" width="45" height="45" class="cell zero"/><text x="22.5" y="120" text-anchor="middle" class="digit0">0</text>
    <rect x="45" y="90" width="45" height="45" class="cell zero"/><text x="67.5" y="120" text-anchor="middle" class="digit0">0</text>
    <rect x="90" y="90" width="45" height="45" class="cell zero"/><text x="112.5" y="120" text-anchor="middle" class="digit0">0</text>
  </g>
</svg>
